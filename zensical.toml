# ==============================
# Theme
# ==============================

[project.theme]
language = "zh"
custom_dir = "docs/assets/overrides"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.indexes",
  "navigation.top",
  "navigation.path",
  "navigation.instant.preview",
  "navigation.footer",
  "content.code.copy",
  "content.tooltips",
  "content.action.edit",
  "content.action.view",
  "content.tabs.link",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
]

[project.theme.icon]
repo = "material/github"
edit = "lucide/pencil"
view = "lucide/eye"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "切换到亮色模式"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "white"
toggle.icon = "lucide/sun"
toggle.name = "切换到暗色模式"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "orange"
toggle.icon = "lucide/moon-star"
toggle.name = "切换到自动模式"

# ==============================
# Plugin
# ==============================

[[project.plugins]]
[project.plugins.search]
lang = "zh"

[[project.plugins]]
[project.plugins.glightbox]
auto_caption = true

# ==============================
# Extra
# ==============================

[project.extra.analytics]
provider = "google"
property = "G-56NDVC0D5B"

[project.extra.status]
todo = "TODO"

