# ==================== 站点配置 ====================
site_name: Open CS/AI Wiki
site_url: https://wiki.dwj601.cn/
repo_url: https://github.com/Explorer-Dong/wiki
repo_name: Explorer-Dong/wiki
edit_uri: edit/main/docs/
copyright: '&copy; 2026 Vincent'


# ==================== 主题配置 ====================
theme:
  language: zh
  custom_dir: docs/assets/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: material/github
    edit: lucide/pencil
    view: lucide/eye
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: lucide/sun-moon
        name: 切换到亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: white
      toggle:
        icon: lucide/sun
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: lucide/moon-star
        name: 切换到自动模式
  features:
    # - header.autohide              # 自动隐藏页面头部
    - navigation.tabs                # 顶部一级分类导航栏
    - navigation.tabs.sticky         # 固定顶部一级分类导航栏
    - navigation.sections          # 分类页小标题
    # - navigation.expand            # 分类页默认展开
    - navigation.indexes           # 不显示分类索引首页
    - navigation.top               # 顶部导航栏
    - navigation.path              # 路径导航
    - navigation.instant.preview   # 预加载内链
    - navigation.footer            # 页脚
    - content.code.copy            # 代码块复制按钮
    # - content.code.select          # 代码块选中行
    - content.tooltips             # 内容悬浮提示
    - content.action.edit          # 编辑源文件按钮
    - content.action.view          # 查看源文件按钮
    - content.tabs.link            # 同名标签一起切换
    - search.highlight             # 搜索结果高亮
    - search.share                 # 社交分享按钮
    - search.suggest               # 搜索建议
    - toc.follow                   # 目录跟随滚动（需要 markdown_extensions.toc.permalink 开启）
    # - announce.dismiss             # 支持手动关闭公告

validation:
  unresolved_references: false

# ==================== 语法扩展 ====================
markdown_extensions:
  # provided by "Python Markdown"
  - abbr               # 悬浮缩写
  - attr_list          # 给 md 添加 HTML 属性和 CSS 类
  - md_in_html
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}

  # provided by "PyMdown Extensions"
  - pymdownx.snippets
  - pymdownx.quotes:  # admonition & details
      callouts: true
  - pymdownx.tabbed:       # 并列展示内容（需要和 superfences 一起使用）
      alternate_style: true
  - pymdownx.superfences:  # 允许嵌套
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:   # 优化数学公式
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji 
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - docs/assets/overrides/.icons
  - pymdownx.highlight:
      auto_title: true
      use_pygments: true         # 第三方库增强
      pygments_lang_class: true  # 语言定制化高亮
      # linenums: true             # 显示行号
      anchor_linenums: true      # 行号锚点
      line_spans: __span         # 行号容器（移动端适配）
  - pymdownx.inlinehilite  # 高亮行内代码
  - pymdownx.tasklist:     # 支持任务列表
      custom_checkbox: true


# ==================== 样式注入 ====================
extra_javascript:
  # KaTeX
  - https://registry.npmmirror.com/katex/0.16.21/files/dist/katex.min.js
  - https://registry.npmmirror.com/katex/0.16.21/files/dist/contrib/auto-render.min.js
  # mermaid
  - https://cdnjs.cloudflare.com/ajax/libs/mermaid/11.12.0/mermaid.min.js
  # 自定义 JS 脚本
  - assets/scripts/extra.js
extra_css:
  # KaTeX
  - https://registry.npmmirror.com/katex/0.16.21/files/dist/katex.min.css
  # 自定义 CSS 样式
  - assets/styles/extra.css


# ==================== 插件配置 ====================
plugins:
  - search:
      lang: zh
  - glightbox:
      auto_caption: true


# ==================== 额外配置 ====================
extra:
  analytics:
    provider: google
    property: G-56NDVC0D5B
  status:
    todo: ToDo
  social:
